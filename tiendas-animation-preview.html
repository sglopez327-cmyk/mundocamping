<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vista previa — Animación Tiendas de Campaña | Mundo Camping</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./tiendas-animation.css" />
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: Inter, ui-sans-serif, system-ui, sans-serif;
        color: #fff;
        background: #020403;
        -webkit-font-smoothing: antialiased;
      }

      .preview-banner {
        position: sticky;
        top: 0;
        z-index: 20;
        padding: 0.85rem 1.25rem;
        border-bottom: 1px solid rgba(110, 231, 183, 0.25);
        background: rgba(2, 4, 3, 0.92);
        backdrop-filter: blur(12px);
        text-align: center;
        font-size: 0.875rem;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.82);
      }

      .preview-banner strong {
        color: #deff9a;
      }

      .container {
        width: 100%;
        max-width: 80rem;
        margin: 0 auto;
        padding: 1.5rem 1rem 3rem;
      }

      @media (min-width: 640px) {
        .container {
          padding-inline: 1.5rem;
        }
      }

      @media (min-width: 1024px) {
        .container {
          padding-inline: 2rem;
        }
      }

      .hero-copy {
        margin-top: 1.75rem;
      }

      .hero-kicker {
        margin: 0;
        font-size: 0.8125rem;
        font-weight: 900;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        color: #6ee7b7;
      }

      .hero-title {
        margin: 0.75rem 0 0;
        font-family: "Plus Jakarta Sans", Inter, sans-serif;
        font-size: clamp(1.875rem, 4vw, 3rem);
        font-weight: 900;
        letter-spacing: -0.03em;
        line-height: 1.1;
      }

      .hero-desc {
        margin: 1rem 0 0;
        max-width: 36rem;
        font-size: 1rem;
        line-height: 1.65;
        color: rgba(255, 255, 255, 0.75);
      }

      .scene-wrap {
        margin-top: 0.5rem;
      }

      .scene-wrap .tn3-scene--hero {
        min-height: 16rem;
        height: 16rem;
      }

      @media (min-width: 768px) {
        .scene-wrap .tn3-scene--hero {
          min-height: 20rem;
          height: 20rem;
        }
      }

      @media (min-width: 1024px) {
        .scene-wrap .tn3-scene--hero {
          min-height: 24rem;
          height: 24rem;
        }
      }
    </style>
  </head>
  <body>
    <p class="preview-banner">
      <strong>Vista previa v3</strong> — Una sola llama suave y Nessie visible en el río. Aún no está en tiendas.html.
    </p>

    <div class="container">
      <div class="scene-wrap">
        <div
          class="tn3-scene tn3-scene--hero"
          role="img"
          aria-label="Tienda de campaña quieta en un bosque junto a un río con el monstruo del lago asomando, y hoguera realista de noche"
        >
          <span class="tn3-scene__glow tn3-scene__glow--moon" aria-hidden="true"></span>
          <span class="tn3-scene__glow tn3-scene__glow--fire" aria-hidden="true"></span>
          <svg
            class="tn3-scene__svg"
            viewBox="0 0 1200 320"
            preserveAspectRatio="xMidYMid slice"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
            aria-hidden="true"
          >
            <g class="tn3-enter tn3-enter--sky">
              <rect width="1200" height="320" fill="url(#tn3Sky)" />
              <rect width="1200" height="320" fill="url(#tn3Vignette)" opacity="0.42" />
              <circle class="tn3-moon" cx="920" cy="52" r="28" fill="url(#tn3Moon)" stroke="#1e293b" stroke-width="2.5" />
              <circle class="tn3-star" cx="120" cy="38" r="2" fill="#ecfdf5" />
              <circle class="tn3-star tn3-star--2" cx="300" cy="26" r="1.5" fill="#fde68a" />
              <circle class="tn3-star tn3-star--3" cx="520" cy="44" r="2" fill="#fff" />
              <circle class="tn3-star tn3-star--4" cx="680" cy="30" r="1.6" fill="#a7f3d0" />
              <circle class="tn3-star tn3-star--5" cx="840" cy="40" r="1.8" fill="#fff" />
              <circle class="tn3-star tn3-star--6" cx="1040" cy="28" r="1.4" fill="#fde68a" />
            </g>

            <g class="tn3-enter tn3-enter--forest">
              <path
                d="M0 188 L160 128 L320 148 L480 108 L640 132 L800 112 L960 138 L1120 108 L1200 118 L1200 320 L0 320 Z"
                fill="#0f2744"
                opacity="0.88"
              />
              <path d="M0 248 Q600 232 1200 248 L1200 320 L0 320 Z" fill="url(#tn3Ground)" />
              <g class="tn3-pine tn3-pine--1" fill="#134e4a" stroke="#052e16" stroke-width="2" stroke-linejoin="round">
                <path d="M48 252 L68 148 L88 252 Z" />
                <path d="M108 252 L132 118 L156 252 Z" />
                <rect x="62" y="252" width="8" height="18" rx="1" fill="#1a1208" />
                <rect x="124" y="252" width="8" height="18" rx="1" fill="#1a1208" />
              </g>
              <g class="tn3-pine tn3-pine--2" fill="#166534" stroke="#052e16" stroke-width="2" stroke-linejoin="round">
                <path d="M188 252 L210 168 L232 252 Z" />
                <rect x="202" y="252" width="8" height="18" rx="1" fill="#1a1208" />
              </g>
              <g class="tn3-pine tn3-pine--3" fill="#134e4a" stroke="#052e16" stroke-width="2" stroke-linejoin="round">
                <path d="M1010 252 L1034 142 L1058 252 Z" />
                <path d="M1080 252 L1108 108 L1136 252 Z" />
                <rect x="1024" y="252" width="8" height="18" rx="1" fill="#1a1208" />
                <rect x="1098" y="252" width="8" height="18" rx="1" fill="#1a1208" />
              </g>
              <g class="tn3-pine tn3-pine--4" fill="#166534" stroke="#052e16" stroke-width="2">
                <path d="M1148 252 L1170 178 L1192 252 Z" />
                <rect x="1160" y="252" width="8" height="18" rx="1" fill="#1a1208" />
              </g>
            </g>

            <g class="tn3-enter tn3-enter--river">
              <path
                d="M0 268 Q280 252 520 258 T920 262 Q1080 264 1200 256 L1200 278 Q1040 286 860 282 T480 278 Q240 274 0 286 Z"
                fill="url(#tn3River)"
                stroke="#1e293b"
                stroke-width="2"
              />
              <ellipse class="tn3-shimmer" cx="680" cy="270" rx="72" ry="5" fill="url(#tn3Shimmer)" />
              <ellipse class="tn3-ripple" cx="420" cy="272" rx="48" ry="3" fill="rgba(255,255,255,0.12)" />
              <ellipse class="tn3-ripple tn3-ripple--2" cx="880" cy="274" rx="56" ry="3" fill="rgba(255,255,255,0.1)" />
            </g>

            <g class="tn3-enter tn3-enter--tent">
              <ellipse cx="480" cy="268" rx="58" ry="8" fill="#1a1208" opacity="0.45" />
              <g>
                <path
                  d="M420 258 L480 198 L540 258 Z"
                  fill="url(#tn3TentRoof)"
                  stroke="#1e293b"
                  stroke-width="2.5"
                  stroke-linejoin="round"
                />
                <path d="M432 258 L480 210 L528 258 Z" fill="url(#tn3TentInner)" opacity="0.55" />
                <path
                  d="M420 258 L540 258 L532 258 L480 228 L428 258 Z"
                  fill="#15803d"
                  stroke="#1e293b"
                  stroke-width="2"
                  stroke-linejoin="round"
                />
                <path d="M468 258 L480 242 L492 258 Z" fill="#052e16" stroke="#1e293b" stroke-width="1.5" />
                <rect x="472" y="242" width="16" height="16" rx="2" fill="#fde68a" opacity="0.75" stroke="#1e293b" stroke-width="1.2" />
              </g>
              <ellipse class="tn3-warm" cx="520" cy="248" rx="90" ry="40" fill="url(#tn3Warm)" />
            </g>

            <g class="tn3-enter tn3-enter--fire">
              <ellipse class="tn3-fire-glow" cx="620" cy="270" rx="40" ry="20" fill="url(#tn3FireGlowOuter)" />
              <ellipse cx="620" cy="278" rx="30" ry="7" fill="#1a1208" opacity="0.55" />
              <rect x="600" y="274" width="40" height="7" rx="2" fill="#3d2818" stroke="#1e293b" stroke-width="1.2" transform="rotate(-12 620 277)" />
              <rect x="600" y="274" width="40" height="7" rx="2" fill="#4a3220" stroke="#1e293b" stroke-width="1.2" transform="rotate(10 620 277)" />
              <g class="tn3-flame-single">
                <path
                  d="M612 276 C614 248 618 228 620 218 C622 228 626 248 628 276 C624 262 620 254 612 276 Z"
                  fill="url(#tn3FlameMain)"
                  stroke="#9a3412"
                  stroke-width="1"
                  stroke-linejoin="round"
                />
                <path
                  d="M617 276 C618 252 620 238 623 276 C621 264 619 258 617 276 Z"
                  fill="url(#tn3FlameCore)"
                  opacity="0.92"
                />
              </g>
            </g>

            <g class="tn3-nessie tn3-enter tn3-enter--nessie">
              <ellipse cx="728" cy="280" rx="28" ry="8" fill="#0e7490" stroke="#1e293b" stroke-width="2" />
              <ellipse cx="758" cy="282" rx="20" ry="6" fill="#0891b2" stroke="#1e293b" stroke-width="1.5" opacity="0.9" />
              <path
                d="M718 272 C712 252 706 228 700 204 C698 194 702 182 710 176 C716 172 724 170 732 174"
                fill="none"
                stroke="#0f766e"
                stroke-width="18"
                stroke-linecap="round"
              />
              <path
                d="M718 272 C712 252 706 228 700 204 C698 194 702 182 710 176 C716 172 724 170 732 174"
                fill="none"
                stroke="#2dd4bf"
                stroke-width="12"
                stroke-linecap="round"
              />
              <ellipse cx="722" cy="168" rx="22" ry="16" fill="#14b8a6" stroke="#1e293b" stroke-width="2.5" />
              <path
                d="M738 168 L768 162 Q774 170 766 176 L738 178 Z"
                fill="#0d9488"
                stroke="#1e293b"
                stroke-width="2"
                stroke-linejoin="round"
              />
              <circle cx="752" cy="166" r="2.8" fill="#1e293b" />
              <g class="tn3-nessie-eye">
                <ellipse cx="714" cy="164" rx="5" ry="5.5" fill="#fef9c3" stroke="#1e293b" stroke-width="1.5" />
                <circle cx="715" cy="163" r="2" fill="#1e293b" />
                <circle cx="716" cy="162" r="0.8" fill="#fff" />
              </g>
              <ellipse
                class="tn3-nessie-ring"
                cx="718"
                cy="270"
                rx="30"
                ry="6"
                fill="none"
                stroke="rgba(186,230,253,0.65)"
                stroke-width="2"
              />
              <ellipse
                class="tn3-nessie-ring tn3-nessie-ring--2"
                cx="718"
                cy="270"
                rx="42"
                ry="8"
                fill="none"
                stroke="rgba(186,230,253,0.35)"
                stroke-width="1.5"
              />
            </g>

            <defs>
              <linearGradient id="tn3Sky" x1="600" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#1e3a8a" />
                <stop offset="100%" stop-color="#0f172a" />
              </linearGradient>
              <radialGradient id="tn3Vignette" cx="50%" cy="50%" r="65%">
                <stop offset="55%" stop-color="rgba(0,0,0,0)" />
                <stop offset="100%" stop-color="rgba(0,0,0,0.55)" />
              </radialGradient>
              <radialGradient id="tn3Moon" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="#fffbeb" />
                <stop offset="100%" stop-color="#fde047" />
              </radialGradient>
              <linearGradient id="tn3Ground" x1="600" y1="248" x2="600" y2="320" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#166534" />
                <stop offset="100%" stop-color="#14532d" />
              </linearGradient>
              <linearGradient id="tn3River" x1="600" y1="252" x2="600" y2="286" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#1d4ed8" />
                <stop offset="100%" stop-color="#1e3a8a" />
              </linearGradient>
              <linearGradient id="tn3RiverSurface" x1="818" y1="266" x2="818" y2="288" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#2563eb" />
                <stop offset="100%" stop-color="#1e3a8a" />
              </linearGradient>
              <linearGradient id="tn3Shimmer" x1="608" y1="270" x2="752" y2="270" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="rgba(255,255,255,0)" />
                <stop offset="50%" stop-color="rgba(255,255,255,0.55)" />
                <stop offset="100%" stop-color="rgba(255,255,255,0)" />
              </linearGradient>
              <linearGradient id="tn3TentRoof" x1="480" y1="198" x2="480" y2="258" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#4ade80" />
                <stop offset="100%" stop-color="#15803d" />
              </linearGradient>
              <linearGradient id="tn3TentInner" x1="480" y1="210" x2="480" y2="258" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#fde68a" stop-opacity="0.45" />
                <stop offset="100%" stop-color="#166534" stop-opacity="0.2" />
              </linearGradient>
              <radialGradient id="tn3Warm" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(251,146,60,0.45)" />
                <stop offset="100%" stop-color="rgba(251,146,60,0)" />
              </radialGradient>
              <radialGradient id="tn3FireGlowOuter" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(251,146,60,0.55)" />
                <stop offset="55%" stop-color="rgba(234,88,12,0.22)" />
                <stop offset="100%" stop-color="rgba(234,88,12,0)" />
              </radialGradient>
              <radialGradient id="tn3FireGlowInner" cx="50%" cy="50%" r="50%">
                <stop offset="0%" stop-color="rgba(254,243,199,0.75)" />
                <stop offset="45%" stop-color="rgba(251,191,36,0.45)" />
                <stop offset="100%" stop-color="rgba(251,146,60,0)" />
              </radialGradient>
              <linearGradient id="tn3FlameBlue" x1="620" y1="274" x2="620" y2="278" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#38bdf8" />
                <stop offset="100%" stop-color="#1d4ed8" />
              </linearGradient>
              <linearGradient id="tn3FlameOuter" x1="620" y1="236" x2="620" y2="276" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#fb923c" />
                <stop offset="55%" stop-color="#ea580c" />
                <stop offset="100%" stop-color="#7c2d12" />
              </linearGradient>
              <linearGradient id="tn3FlameMid" x1="620" y1="232" x2="620" y2="276" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#fcd34d" />
                <stop offset="40%" stop-color="#fb923c" />
                <stop offset="100%" stop-color="#c2410c" />
              </linearGradient>
              <linearGradient id="tn3FlameMain" x1="620" y1="218" x2="620" y2="276" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#fef08a" />
                <stop offset="35%" stop-color="#fb923c" />
                <stop offset="75%" stop-color="#ea580c" />
                <stop offset="100%" stop-color="#9a3412" />
              </linearGradient>
              <linearGradient id="tn3FlameCore" x1="620" y1="242" x2="620" y2="276" gradientUnits="userSpaceOnUse">
                <stop offset="0%" stop-color="#fffbeb" />
                <stop offset="40%" stop-color="#fde68a" />
                <stop offset="100%" stop-color="#fb923c" />
              </linearGradient>
            </defs>
          </svg>
        </div>
      </div>

      <div class="hero-copy">
        <p class="hero-kicker">Refugio en la cima</p>
        <h1 class="hero-title">Tiendas de Campaña</h1>
        <p class="hero-desc">
          Refugios familiares y técnicos para dormir cómodo en montaña, ruta o acampada.
        </p>
      </div>
    </div>
  </body>
</html>
