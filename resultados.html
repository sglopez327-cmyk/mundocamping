<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Resultados de búsqueda de productos de camping en Mundo Camping." />
    <title>Mundo Camping | Resultados de búsqueda</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@700;800;900&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
              display: ['"Plus Jakarta Sans"', 'Inter', 'ui-sans-serif', 'sans-serif'],
            },
            colors: {
              premium: { accent: '#deff9a', night: '#020403' },
            },
            boxShadow: {
              glass: '0 12px 40px rgba(0, 0, 0, 0.35)',
              'glass-lg': '0 20px 50px rgba(0, 0, 0, 0.45)',
            },
          },
        },
      };
    </script>
    <link rel="stylesheet" href="./mundo-camping.css" />
    <link rel="stylesheet" href="./site-header.css" />
    <link rel="stylesheet" href="./footer-premium.css" />
    <link rel="stylesheet" href="./campfire-animation.css" />
    <script src="./data/catalog-bundle.js"></script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      .container-premium {
        width: 100%;
        max-width: 80rem;
        margin-left: auto;
        margin-right: auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      @media (min-width: 640px) {
        .container-premium {
          padding-left: 1.5rem;
          padding-right: 1.5rem;
        }
      }
      @media (min-width: 1024px) {
        .container-premium {
          padding-left: 2rem;
          padding-right: 2rem;
        }
      }
      nav .menu-categorias {
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }
      nav .menu-categorias::-webkit-scrollbar {
        display: none;
      }
      nav .menu-categorias li,
      nav .menu-categorias a {
        overflow: visible;
      }
    </style>
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3646085735328403"
      crossorigin="anonymous"
    ></script>
  </head>
  <body class="min-h-screen bg-[#020403] font-sans text-white antialiased">
    <header id="site-header"></header>
    <script src="./js/site-header.js"></script>

    <main>
      <section class="relative overflow-hidden bg-[#020403] text-white">
        <div
          class="pointer-events-none absolute inset-0 bg-[radial-gradient(circle_at_22%_28%,rgba(34,197,94,0.28),transparent_21rem),radial-gradient(circle_at_74%_52%,rgba(249,115,22,0.16),transparent_24rem),linear-gradient(180deg,#050805_0%,#020403_64%,#050807_100%)]"
        ></div>
        <div class="pointer-events-none absolute inset-x-0 top-0 h-px bg-gradient-to-r from-transparent via-emerald-300/70 to-transparent"></div>
        <div class="container-premium relative py-12 lg:py-16">
          <p class="text-sm font-black uppercase tracking-[0.25em] text-emerald-300">Búsqueda</p>
          <h1 class="mt-3 font-display text-3xl font-black tracking-tight text-white sm:text-4xl">Resultados</h1>

          <form
            id="results-search-form"
            class="mt-8 max-w-2xl"
            action="resultados.html"
            method="get"
            role="search"
            aria-label="Buscar productos"
          >
            <div class="hero-search">
              <label class="sr-only" for="results-search-input">Buscar productos</label>
              <svg class="h-5 w-5 shrink-0 text-emerald-200/80" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="1.8"></circle>
                <path d="m20 20-3.5-3.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
              </svg>
              <input
                id="results-search-input"
                type="text"
                name="q"
                placeholder="Buscar productos por nombre…"
                autocomplete="off"
                required
                enterkeyhint="search"
              />
              <button
                type="button"
                class="hero-search-btn"
                onclick="var input=document.getElementById('results-search-input');var query=(input&amp;&amp;input.value||'').trim();if(!query){if(input){input.focus();}return;}window.location.href='resultados.html?q='+encodeURIComponent(query);"
              >
                Buscar
              </button>
            </div>
          </form>
          <script>
            document.getElementById('results-search-form')?.addEventListener('submit', function (event) {
              event.preventDefault();
              var input = document.getElementById('results-search-input');
              var query = (input && input.value || '').trim();
              if (!query) {
                if (input) {
                  input.focus();
                }
                return;
              }
              window.location.href = 'resultados.html?q=' + encodeURIComponent(query);
            });
          </script>

          <p id="resultados-loading" class="mt-10 text-sm text-white/60">Cargando catálogo…</p>
          <p id="resultados-summary" class="mt-10 text-sm text-white/70"></p>
          <p
            id="resultados-empty"
            class="mt-8 hidden rounded-2xl border border-white/10 bg-white/5 px-4 py-6 text-center text-sm text-white/75"
          >
            No se encontraron productos para tu búsqueda.
          </p>
          <p id="resultados-error" class="mt-6 hidden rounded-2xl border border-red-400/30 bg-red-950/40 px-4 py-3 text-sm text-red-100"></p>

          <div
            id="resultados-grid"
            class="mt-10 grid grid-cols-1 gap-8 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4"
            aria-live="polite"
          ></div>
        </div>
      </section>
    </main>

    <div
      id="product-modal"
      class="fixed inset-0 z-50 hidden items-center justify-center p-4 sm:p-6"
      role="dialog"
      aria-modal="true"
      aria-labelledby="product-modal-title"
      aria-hidden="true"
    >
      <div id="product-modal-backdrop" class="absolute inset-0 bg-black/70 backdrop-blur-sm" aria-hidden="true"></div>
      <div
        id="product-modal-panel"
        class="glass-panel relative z-10 flex w-full min-h-0 max-h-[90vh] max-w-lg flex-col overflow-hidden rounded-2xl shadow-glass-lg sm:max-w-2xl"
      >
        <button
          id="product-modal-close"
          type="button"
          class="absolute right-3 top-3 z-30 flex h-11 w-11 items-center justify-center rounded-2xl border border-white/20 bg-white/10 text-lg font-bold text-white backdrop-blur-md transition hover:border-emerald-300/50 hover:bg-emerald-500/20 hover:text-[#deff9a]"
          aria-label="Cerrar"
        >
          &times;
        </button>
        <div id="product-modal-scroll" class="min-h-0 flex-1 overflow-y-auto overscroll-contain">
          <section id="product-modal-gallery" class="shrink-0 flex-none border-b border-white/10 bg-zinc-900">
            <div id="product-modal-image-wrap" class="flex w-full items-center justify-center px-4 py-4 sm:px-5 sm:py-5">
              <img
                id="product-modal-image"
                src=""
                alt=""
                class="mx-auto h-auto w-full max-h-[min(24vh,10rem)] object-contain sm:max-h-[min(28vh,12rem)]"
              />
            </div>
            <div
              id="product-modal-thumbnails"
              class="hidden gap-2 overflow-x-auto px-4 pb-3 sm:px-5 sm:pb-4"
              role="list"
              aria-label="Galería de imágenes del producto"
            ></div>
          </section>
          <div id="product-modal-body" class="px-6 py-6 pb-4 sm:px-8 sm:py-8">
            <h2 id="product-modal-title" class="mb-3 pr-10 font-display text-lg font-black leading-snug text-white sm:mb-4 sm:text-2xl"></h2>
            <div id="product-modal-rating" class="hidden"></div>
            <div
              id="product-modal-description"
              class="product-modal-description hidden px-1 pb-2 text-sm leading-7 text-gray-300 sm:text-base sm:leading-8"
            ></div>
          </div>
        </div>
        <div id="product-modal-footer" class="shrink-0 border-t border-white/10 bg-zinc-950/95 px-6 pt-4 pb-5 backdrop-blur-sm sm:px-8 sm:pb-6">
          <a
            id="product-modal-buy"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="product-cta-amazon inline-flex w-full items-center justify-center gap-2 rounded-full px-6 py-4 text-sm font-bold transition-transform duration-200 hover:scale-105 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#deff9a] sm:text-base"
          >
            <span>Más información en Amazon</span>
          </a>
          <p id="product-modal-buy-unavailable" class="hidden text-center text-sm text-white/50">Enlace de compra no disponible</p>
        </div>
      </div>
    </div>

        <footer id="site-footer"></footer>
    <script src="./js/site-footer.js"></script><script src="./search-results.js"></script>
  </body>
</html>
