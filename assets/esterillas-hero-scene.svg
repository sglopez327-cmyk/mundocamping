                <!-- Rebote esterilla al saltar -->
                <g class="est3-mat-bounce" aria-hidden="true">
                  <ellipse cx="380" cy="292" rx="180" ry="8" fill="none" stroke="#5eead4" stroke-width="2" opacity="0"/>
                </g>

                <defs>
                  <linearGradient id="est3Sky" x1="600" y1="0" x2="600" y2="320" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#1e3a8a"/><stop offset="100%" stop-color="#0f172a"/>
                  </linearGradient>
                  <radialGradient id="est3Moon" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="#fffbeb"/><stop offset="100%" stop-color="#fde047"/>
                  </radialGradient>
                  <linearGradient id="est3Floor" x1="600" y1="248" x2="600" y2="320" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#166534"/><stop offset="100%" stop-color="#14532d"/>
                  </linearGradient>
                  <linearGradient id="est3TentInner" x1="600" y1="48" x2="600" y2="248" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#22c55e"/><stop offset="100%" stop-color="#15803d"/>
                  </linearGradient>
                  <linearGradient id="est3TentPeak" x1="600" y1="72" x2="600" y2="248" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#4ade80" stop-opacity="0.5"/><stop offset="100%" stop-color="#166534" stop-opacity="0.2"/>
                  </linearGradient>
                  <linearGradient id="est3WarmLight" x1="600" y1="102" x2="600" y2="248" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="rgba(254,243,199,0.55)"/><stop offset="100%" stop-color="rgba(251,191,36,0.05)"/>
                  </linearGradient>
                  <radialGradient id="est3LanternGlow" cx="50%" cy="50%" r="50%">
                    <stop offset="0%" stop-color="rgba(254,243,199,0.6)"/><stop offset="100%" stop-color="rgba(251,191,36,0)"/>
                  </radialGradient>
                  <linearGradient id="est3MatSide" x1="148" y1="272" x2="612" y2="272" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#0f766e"/><stop offset="50%" stop-color="#14b8a6"/><stop offset="100%" stop-color="#0d9488"/>
                  </linearGradient>
                  <linearGradient id="est3MatTop" x1="380" y1="228" x2="380" y2="294" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="#5eead4"/><stop offset="100%" stop-color="#2dd4bf"/>
                  </linearGradient>
                  <linearGradient id="est3LakeShimmer" x1="364" y1="236" x2="476" y2="236" gradientUnits="userSpaceOnUse">
                    <stop offset="0%" stop-color="rgba(255,255,255,0)"/><stop offset="50%" stop-color="rgba(255,255,255,0.5)"/><stop offset="100%" stop-color="rgba(255,255,255,0)"/>
                  </linearGradient>
