                      <ellipse cx="220" cy="276" rx="18" ry="5"/><ellipse cx="280" cy="270" rx="18" ry="5"/><ellipse cx="340" cy="264" rx="18" ry="5"/>
                      <ellipse cx="400" cy="258" rx="18" ry="5"/><ellipse cx="460" cy="254" rx="18" ry="5"/><ellipse cx="520" cy="250" rx="16" ry="5"/>
                    </g>
                    <circle cx="588" cy="268" r="6" fill="#475569" stroke="#1e293b" stroke-width="1.5"/>
