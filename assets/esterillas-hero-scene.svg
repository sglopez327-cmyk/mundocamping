                  <g fill="#134e4a" stroke="#052e16" stroke-width="2" stroke-linejoin="round">
                    <path d="M240 248 L258 188 L276 248 Z"/>
                    <path d="M320 248 L340 175 L360 248 Z"/>
                    <path d="M880 248 L900 182 L920 248 Z"/>
                    <path d="M960 248 L982 168 L1004 248 Z"/>
                  </g>
                  <circle class="est3-moon" cx="180" cy="56" r="28" fill="url(#est3Moon)" stroke="#1e293b" stroke-width="2.5"/>
