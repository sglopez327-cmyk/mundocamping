                </g>

                <!-- Manguera y aire -->
                <path class="est3-hose" d="M548 282 Q620 288 700 276 Q740 268 758 258" stroke="#1e293b" stroke-width="5" stroke-linecap="round" fill="none"/>
                <g class="est3-air">
