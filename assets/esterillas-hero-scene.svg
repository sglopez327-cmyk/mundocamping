                  <circle cx="826" cy="186" r="22" fill="#fcd9b6" stroke="#1e293b" stroke-width="2.5"/>
                  <path d="M806 172 Q820 158 836 158 Q852 158 862 172 Q850 184 836 180 Q822 184 806 172" fill="#3f2a1d" stroke="#1e293b" stroke-width="2"/>
                  <ellipse cx="818" cy="182" rx="2.5" ry="2" fill="#1e293b"/><ellipse cx="834" cy="182" rx="2.5" ry="2" fill="#1e293b"/>
                  <path d="M822 192 Q828 196 834 192" stroke="#5c4030" stroke-width="1.8" stroke-linecap="round" fill="none"/>
                </g>

                <!-- Hijo (verde) -->
                <g class="est3-kid est3-kid--boy">
