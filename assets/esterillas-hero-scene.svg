                  <path d="M0 248 L1200 248 L1200 320 L0 320 Z" fill="url(#est3Floor)"/>
                  <ellipse cx="600" cy="298" rx="560" ry="18" fill="#052e16" opacity="0.5"/>
                </g>

                <g class="est3-enter est3-enter--lantern est3-lantern">
