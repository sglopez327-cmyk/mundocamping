                  <path d="M-8 262 L22 262 L18 238 Q4 228 -4 238 Z" fill="#4ade80" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
                  <circle cx="8" cy="224" r="16" fill="#fcd9b6" stroke="#1e293b" stroke-width="2.5"/>
                  <path d="M-2 212 Q8 198 20 206 Q18 218 8 214 Q-2 218 -2 212" fill="#422006" stroke="#1e293b" stroke-width="1.5"/>
                  <ellipse cx="4" cy="222" rx="2" ry="2.5" fill="#1e293b"/><ellipse cx="14" cy="222" rx="2" ry="2.5" fill="#1e293b"/>
                  <path d="M6 230 Q10 234 14 230" stroke="#5c4030" stroke-width="1.5" stroke-linecap="round" fill="none"/>
                </g>

                <!-- Hija (rosa) -->
                <g class="est3-kid est3-kid--girl">
                  <ellipse class="est3-kid-shadow" cx="0" cy="268" rx="20" ry="6" fill="#1a1208" opacity="0.35"/>
                  <path d="M-16 262 L-4 278 L8 262 Z" fill="#9d174d" stroke="#1e293b" stroke-width="2"/>
                  <path d="M8 262 L20 278 L32 262 Z" fill="#9d174d" stroke="#1e293b" stroke-width="2"/>
                  <path d="M-6 262 L24 262 L20 240 Q6 230 -2 240 Z" fill="#f472b6" stroke="#1e293b" stroke-width="2.5" stroke-linejoin="round"/>
                  <circle cx="10" cy="226" r="15" fill="#fcd9b6" stroke="#1e293b" stroke-width="2.5"/>
                  <path d="M0 214 Q10 200 22 208 Q20 220 10 216 Q0 220 0 214" fill="#422006" stroke="#1e293b" stroke-width="1.5"/>
                  <circle cx="22" cy="206" r="6" fill="#ec4899" stroke="#1e293b" stroke-width="1.5"/>
                  <ellipse cx="6" cy="224" rx="2" ry="2.5" fill="#1e293b"/><ellipse cx="16" cy="224" rx="2" ry="2.5" fill="#1e293b"/>
                  <path d="M8 232 Q12 236 16 232" stroke="#5c4030" stroke-width="1.5" stroke-linecap="round" fill="none"/>
