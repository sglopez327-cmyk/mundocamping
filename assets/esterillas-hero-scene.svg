                  <circle class="est3-star est3-star--2" cx="480" cy="28" r="1.6" fill="#fde68a"/>
                  <circle class="est3-star est3-star--3" cx="640" cy="44" r="2" fill="#ecfdf5"/>
                  <circle class="est3-star est3-star--4" cx="800" cy="32" r="1.5" fill="#fff"/>
