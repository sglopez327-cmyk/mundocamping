<svg viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
<!-- Fondo nocturno (vista desde dentro de la tienda) -->
                <g class="est3-enter est3-enter--sky">
                  <rect width="1200" height="320" fill="url(#est3Sky)" />
