                      <ellipse cx="794" cy="174" rx="11" ry="8" fill="#fcd9b6" stroke="#1e293b" stroke-width="1.5"/>
                      <path d="M758 182 L766 204" stroke="#1e40af" stroke-width="13" stroke-linecap="round"/>
                      <path d="M794 182 L802 204" stroke="#1e40af" stroke-width="13" stroke-linecap="round"/>
                    </g>
