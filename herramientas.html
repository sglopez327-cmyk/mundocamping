    <style>
      .breathing-animation {
        animation: breathe 6s ease-in-out infinite;
      }

      @keyframes breathe {
        0%,
        100% {
          transform: scale(1);
          filter: brightness(1);
        }
        50% {
          transform: scale(1.02);
          filter: brightness(1.05);
        }
      }
    </style>

    <style>
      html {
        scroll-behavior: smooth;
      }
      .container-premium {
        width: 100%;
        max-width: 80rem;
        margin-left: auto;
        margin-right: auto;
        padding-left: 1rem;
        padding-right: 1rem;
      }
      @media (min-width: 640px) {
        .container-premium {
          padding-left: 1.5rem;
          padding-right: 1.5rem;
        }
      }
      @media (min-width: 1024px) {
        .container-premium {
          padding-left: 2rem;
          padding-right: 2rem;
        }
      }
      .line-clamp-2 {
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
      }
      .product-modal-thumb.is-active {
        border-color: rgba(110, 231, 183, 0.6);
        box-shadow: 0 0 0 2px #18181b, 0 0 0 4px #deff9a;
      }
      .product-modal-description p:last-child,
      .product-modal-description ul:last-child {
        margin-bottom: 0;
      }
      .grid-guias {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 1rem;
      }
      @media (max-width: 1279px) {
        .grid-guias-scroll {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
        }
        .grid-guias {
          min-width: 62rem;
        }
      }
      @keyframes heroFadeUp {
        from {
          opacity: 0;
          transform: translateY(20px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      @keyframes mountainFloat {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-7px);
        }
      }
      .hero-animation {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.5rem;
        opacity: 0;
        animation: heroFadeUp 1.5s ease-out forwards;
      }
      .hero-mountain-icon {
        width: 2.25rem;
        height: 1.5rem;
        flex-shrink: 0;
        color: #6ee7b7;
        filter: drop-shadow(0 0 10px rgba(52, 211, 153, 0.45));
        animation: mountainFloat 3s ease-in-out infinite;
      }
      .hero-animation h2 {
        margin: 0;
        font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
        font-size: 0.875rem;
        font-weight: 500;
        line-height: 1.4;
        color: #ffffff;
        text-align: center;
      }
      @media (min-width: 640px) {
        .hero-animation {
          align-items: flex-start;
        }
        .hero-animation h2 {
          font-size: 0.9375rem;
          text-align: left;
        }
      }
      .nav-menu-links {
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        -ms-overflow-style: none;
      }
      .nav-menu-links::-webkit-scrollbar {
        display: none;
      }
      .nav-menu-links a {
        flex-shrink: 0;
      }
      nav .menu-categorias {
        flex: 1 1 auto;
        min-width: 0;
        overflow-x: auto;
        overflow-y: visible;
        -webkit-overflow-scrolling: touch;
        scrollbar-width: none;
        padding-left: 0.5rem;
        padding-right: 0.5rem;
      }
      nav .menu-categorias::-webkit-scrollbar {
        display: none;
      }
      nav .menu-categorias li,
      nav .menu-categorias a {
        overflow: visible;
      }
      .hero-lottie {
        position: relative;
        width: 100%;
        height: 500px;
        overflow: hidden;
        border-radius: 1.25rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: transparent;
      }
      .hero-lottie dotlottie-player {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        min-width: 100%;
        min-height: 100%;
        display: block;
        margin: 0;
      }
    </style>

              class="hidden gap-2 overflow-x-auto px-4 pb-3 sm:px-5 sm:pb-4"
              role="list"
              aria-label="Galería de imágenes del producto"
            ></div>
          </section>

          <div id="product-modal-body" class="px-6 py-6 pb-4 sm:px-8 sm:py-8">
            <h2
              id="product-modal-title"
              class="mb-3 pr-10 font-display text-lg font-black leading-snug text-white sm:mb-4 sm:text-2xl"
            ></h2>
            <div id="product-modal-rating" class="hidden"></div>
            <div
              id="product-modal-description"
              class="product-modal-description hidden px-1 pb-2 text-sm leading-7 text-gray-300 sm:text-base sm:leading-8"
            ></div>
          </div>
        </div>

        <div
          id="product-modal-footer"
          class="shrink-0 border-t border-white/10 bg-zinc-950/95 px-6 pt-4 pb-5 backdrop-blur-sm sm:px-8 sm:pb-6"
        >
          <a
            id="product-modal-buy"
            href="#"
            target="_blank"
            rel="noopener noreferrer"
            class="product-cta-amazon inline-flex w-full items-center justify-center gap-2 rounded-full px-6 py-4 text-sm font-bold transition-transform duration-200 hover:scale-105 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#deff9a] sm:text-base"
          >
            <span>Ver precios y detalles en Amazon</span>
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h13M14 8l4 4-4 4M9 20H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </a>
          <p id="product-modal-buy-unavailable" class="hidden text-center text-sm text-white/50">
            Enlace de compra no disponible
          </p>
        </div>
      </div>
    </div>
        <footer id="site-footer"></footer>
    
    <script defer src="./js/site-header.js?v=8"></script>
    <script defer src="./js/load-adsense.js"></script>
<script defer src="./js/site-footer.js"></script><script>
      (function () {
        const grid = document.getElementById('productos-herramientas');
        const errorBox = document.getElementById('productos-herramientas-error');
        const modal = document.getElementById('product-modal');
        const modalBackdrop = document.getElementById('product-modal-backdrop');
        const modalCloseBtn = document.getElementById('product-modal-close');
        const modalGallery = document.getElementById('product-modal-gallery');
        const modalImageWrap = document.getElementById('product-modal-image-wrap');
        const modalImage = document.getElementById('product-modal-image');
        const modalThumbnails = document.getElementById('product-modal-thumbnails');
        const modalTitle = document.getElementById('product-modal-title');
        const modalDescription = document.getElementById('product-modal-description');
        const modalBuy = document.getElementById('product-modal-buy');
        const modalBuyUnavailable = document.getElementById('product-modal-buy-unavailable');

        const FIELD_TITLE = ['Título', 'titulo', 'title', 'nombre', 'name'];
        const FIELD_IMAGE = ['Image Url', 'image', 'imagen', 'image_url', 'imageUrl', 'img'];
        const FIELD_IMAGES = ['Imágenes', 'imagenes', 'images', 'Images'];
        const FIELD_VIDEOS = ['Videos', 'videos', 'Video', 'video', 'youtube', 'YouTube', 'youtubeUrl', 'youtube_url'];
        const FIELD_URL = ['amazonLink', 'URL de compra', 'url_compra', 'link', 'product_url', 'amazon_url', 'url', 'href'];
        const AMAZON_CTA_LABEL = 'Ver precios y detalles en Amazon';
        const FIELD_DESCRIPTION = ['Descripción', 'descripcion', 'description', 'desc'];
        const FIELD_RATING = ['rating', 'Rating', 'valoracion', 'Valoración', 'estrellas'];
        const FIELD_RATING_COUNT = ['ratingCount', 'rating_count', 'num_reviews', 'opiniones', 'reviewCount'];

        const THUMB_BASE =
          'product-modal-thumb shrink-0 overflow-hidden rounded-xl border border-white/15 bg-zinc-800 transition hover:border-emerald-300/40 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#deff9a]';

        let productsCatalog = [];
        let activeGalleryIndex = 0;

        function pickField(item, keys) {
          for (const key of keys) {
            if (item[key] != null && String(item[key]).trim() !== '') {
              return String(item[key]).trim();
            }
          }
          return '';
        }

        function collectImages(merged, extras) {
          const urls = [];
          const add = (value) => {
            const url = typeof value === 'string' ? value.trim() : pickField(value, FIELD_IMAGE);
            if (url && !urls.includes(url)) {
              urls.push(url);
            }
          };

          for (const key of FIELD_IMAGES) {
            const list = merged[key];
            if (Array.isArray(list)) {
              list.forEach(add);
            }
          }

          add(pickField(merged, FIELD_IMAGE));
          (extras || []).forEach(add);

          return urls;
        }

        function getYouTubeId(value) {
          const url = String(value || '').trim();
          if (!url) {
            return '';
          }

          const shortMatch = url.match(/youtu\.be\/([A-Za-z0-9_-]{6,})/);
          if (shortMatch) {
            return shortMatch[1];
          }

          const embedMatch = url.match(/youtube\.com\/embed\/([A-Za-z0-9_-]{6,})/);
          if (embedMatch) {
            return embedMatch[1];
          }

          try {
            const parsed = new URL(url);
            return parsed.searchParams.get('v') || '';
          } catch {
            return '';
          }
        }

        function collectVideos(merged) {
          const videos = [];
          const add = (value) => {
            if (value == null || value === '') {
              return;
            }

            const url = typeof value === 'string' ? value.trim() : pickField(value, ['url', 'href', 'src', 'embed']);
            const id = getYouTubeId(url);
            if (!id) {
              return;
            }

            const src = `https://www.youtube.com/embed/${id}`;
            if (!videos.some((video) => video.src === src)) {
              videos.push({
                type: 'video',
                src,
                thumb: `https://img.youtube.com/vi/${id}/hqdefault.jpg`,
              });
            }
          };

          for (const key of FIELD_VIDEOS) {
            const value = merged[key];
            if (Array.isArray(value)) {
              value.forEach(add);
            } else {
              add(value);
            }
          }

          return videos;
        }

        function parseRatingValue(item) {
          for (const key of FIELD_RATING) {
            if (item[key] != null && item[key] !== '') {
              const value = parseFloat(String(item[key]).replace(',', '.'));
              if (Number.isFinite(value)) {
                return Math.min(5, Math.max(0, Math.round(value * 10) / 10));
              }
            }
          }
          return null;
        }

        function parseRatingCountValue(item) {
          for (const key of FIELD_RATING_COUNT) {
            if (item[key] != null && item[key] !== '') {
              const value = String(item[key]).trim();
              if (value) {
                return value;
              }
            }
          }
          return null;
        }

        function renderProductRating(rating, ratingCount) {
          const modalRating = document.getElementById('product-modal-rating');
          if (!modalRating) {
            return;
          }

          if (rating == null) {
            modalRating.innerHTML = '';
            modalRating.classList.add('hidden');
            return;
          }

          const stars = [];
          for (let i = 1; i <= 5; i += 1) {
            let starClass = 'product-rating-star';
            if (rating >= i - 0.25) {
              starClass += ' is-full';
            } else if (rating >= i - 0.75) {
              starClass += ' is-half';
            }
            stars.push(`<span class="${starClass}" aria-hidden="true">★</span>`);
          }

          const valueText = rating.toFixed(1).replace('.', ',');
          const countHtml = ratingCount
            ? `<span class="product-rating-count">(${escapeHtml(ratingCount)} opiniones)</span>`
            : '';

          modalRating.innerHTML = `
            <div class="product-rating" role="img" aria-label="Valoración ${valueText} de 5 estrellas">
              <span class="product-rating-stars">${stars.join('')}</span>
              <span class="product-rating-value">${escapeHtml(valueText)}</span>
              <span class="product-rating-label">de 5</span>
              ${countHtml}
            </div>`;
          modalRating.classList.remove('hidden');
        }

        function mapItemToProduct(item, meta) {
          const merged = meta ? { ...meta, ...item } : item;
          const title = pickField(merged, FIELD_TITLE);
          const buyUrl = pickField(merged, FIELD_URL);
          const description = pickField(merged, FIELD_DESCRIPTION);
          const images = collectImages(merged, []);
          const videos = collectVideos(merged);
          const image = images[0] || '';

          if (!title && !image) {
            return null;
          }

          return {
            title: title || 'Producto recomendado',
            image,
            images,
            videos,
            media: [...images.map((src) => ({ type: 'image', src })), ...videos],
            buyUrl,
            description,
            rating: parseRatingValue(merged),
            ratingCount: parseRatingCountValue(merged),
          };
        }

        function formatDescription(text) {
          if (!text) {
            return '';
          }

          const blocks = String(text)
            .trim()
            .split(/\n{2,}/)
            .map((block) => block.trim())
            .filter(Boolean);

          return blocks
            .map((block) => {
              const lines = block.split('\n').map((line) => line.trim()).filter(Boolean);
              const isList = lines.length > 0 && lines.every((line) => /^[-*•]\s+/.test(line));

              if (isList) {
                const items = lines
                  .map((line) => `<li>${escapeHtml(line.replace(/^[-*•]\s+/, ''))}</li>`)
                  .join('');
                return `<ul class="mb-3 list-disc space-y-1.5 pl-5 marker:text-emerald-300">${items}</ul>`;
              }

              const paragraph = lines.map((line) => escapeHtml(line)).join('<br />');
              return `<p class="mb-3 last:mb-0">${paragraph}</p>`;
            })
            .join('');
        }

        function escapeHtml(value) {
          return String(value)
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&#39;');
        }

        function renderAmazonCta(buyUrl, variant) {
          const baseClass =
            'product-cta-amazon inline-flex items-center justify-center gap-2 rounded-full font-bold text-white transition-transform duration-200 hover:scale-105 focus:outline-none focus-visible:ring-2 focus-visible:ring-[#deff9a] focus-visible:ring-offset-2 focus-visible:ring-offset-zinc-950';
          const sizeClass =
            variant === 'compact'
              ? 'product-cta-amazon--compact w-full px-4 py-2.5 text-xs sm:text-sm'
              : 'mt-5 w-full px-5 py-3.5 text-sm sm:text-base';

          if (!buyUrl) {
            return `<p class="${variant === 'compact' ? 'mt-3' : 'mt-5'} text-center text-xs text-white/45">Enlace de Amazon no disponible</p>`;
          }

          return `<a
            href="${escapeHtml(buyUrl)}"
            target="_blank"
            rel="noopener noreferrer"
            class="${baseClass} ${sizeClass}"
            data-amazon-cta="true"
          >
            <span>${AMAZON_CTA_LABEL}</span>
            <svg class="h-4 w-4 shrink-0" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M5 12h13M14 8l4 4-4 4M9 20H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              ></path>
            </svg>
          </a>`;
        }

        function setActiveThumbnail(index) {
          activeGalleryIndex = index;
          modalThumbnails.querySelectorAll('.product-modal-thumb').forEach((thumb, i) => {
            thumb.classList.toggle('is-active', i === index);
            thumb.setAttribute('aria-current', i === index ? 'true' : 'false');
          });
        }

        function setMainImage(src, index) {
          modalImageWrap.querySelector('iframe')?.remove();

          if (!src) {
            modalImage.removeAttribute('src');
            modalImage.alt = '';
            modalImage.classList.add('hidden');
            modalImageWrap.classList.add('hidden');
            modalGallery.classList.add('hidden');
            return;
          }

          modalImage.src = src;
          modalImage.alt = modalTitle.textContent || 'Imagen del producto';
          modalImage.classList.remove('hidden');
          modalImageWrap.classList.remove('hidden');
          modalGallery.classList.remove('hidden');
          setActiveThumbnail(index);
        }

        function setMainVideo(src, index) {
          modalImage.removeAttribute('src');
          modalImage.alt = '';
          modalImage.classList.add('hidden');
          modalImageWrap.querySelector('iframe')?.remove();

          const iframe = document.createElement('iframe');
          iframe.src = src;
          iframe.title = `Video de ${modalTitle.textContent || 'producto'}`;
          iframe.className = 'aspect-video w-full rounded-xl border border-white/10 bg-black';
          iframe.allow = 'accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share';
          iframe.allowFullscreen = true;
          modalImageWrap.appendChild(iframe);
          modalImageWrap.classList.remove('hidden');
          modalGallery.classList.remove('hidden');
          setActiveThumbnail(index);
        }

        function setMainMedia(item, index) {
          if (!item) {
            setMainImage('', 0);
            return;
          }

          if (item.type === 'video') {
            setMainVideo(item.src, index);
            return;
          }

          setMainImage(item.src || item, index);
        }

        function updateGallery(mediaItems) {
          modalThumbnails.innerHTML = '';
          modalThumbnails.classList.remove('flex');
          modalThumbnails.classList.add('hidden');
          const items = (mediaItems || []).map((item) => (typeof item === 'string' ? { type: 'image', src: item } : item));

          if (!items.length) {
            setMainImage('', 0);
            return;
          }

          setMainMedia(items[0], 0);

          if (items.length <= 1) {
            return;
          }

          const fragment = document.createDocumentFragment();

          items.forEach((item, index) => {
            const button = document.createElement('button');
            button.type = 'button';
            button.className = `${THUMB_BASE}${index === 0 ? ' is-active' : ''}`;
            button.dataset.thumbIndex = String(index);
            button.dataset.thumbType = item.type || 'image';
            button.dataset.thumbSrc = item.src;
            button.setAttribute('role', 'listitem');
            button.setAttribute('aria-label', item.type === 'video' ? `Ver video ${index + 1}` : `Ver imagen ${index + 1}`);
            button.setAttribute('aria-current', index === 0 ? 'true' : 'false');

            const img = document.createElement('img');
            img.src = item.type === 'video' ? item.thumb : item.src;
            img.alt = '';
            img.loading = 'lazy';
            img.className = 'h-14 w-14 object-cover sm:h-16 sm:w-16';
            button.appendChild(img);

            if (item.type === 'video') {
              const badge = document.createElement('span');
              badge.className = 'pointer-events-none absolute inset-0 flex items-center justify-center bg-black/25 text-lg text-white';
              badge.textContent = '▶';
              button.classList.add('relative');
              button.appendChild(badge);
            }

            fragment.appendChild(button);
          });

          modalThumbnails.appendChild(fragment);
          modalThumbnails.classList.remove('hidden');
          modalThumbnails.classList.add('flex');
        }

        function normalizeCatalog(payload) {
          if (!payload || typeof payload !== 'object') {
            return [];
          }

          if (Array.isArray(payload)) {
            return payload.map((item) => mapItemToProduct(item)).filter(Boolean);
          }

          if (payload.meta || payload.productos) {
            const meta = payload.meta || {};
            const list = Array.isArray(payload.productos) ? payload.productos : [];
            if (list.length) {
              return list.map((item) => mapItemToProduct(item, meta)).filter(Boolean);
            }
            const single = mapItemToProduct(meta);
            return single ? [single] : [];
          }

          const single = mapItemToProduct(payload);
          return single ? [single] : [];
        }

        function renderCard(product, index) {
          const title = escapeHtml(product.title);
          const image = escapeHtml(product.image);
          const ctaHtml = renderAmazonCta(product.buyUrl, 'compact');

          return `
            <article
              class="product-card glass-card flex h-full flex-col cursor-pointer rounded-2xl transition"
              data-product-index="${index}"
              role="button"
              tabindex="0"
              aria-label="Ver detalles de ${title}"
            >
              <div class="product-card-image relative flex aspect-[4/3] shrink-0 items-center justify-center bg-zinc-900 p-1.5">
                ${
                  product.image
                    ? `<img src="${image}" alt="${title}" class="max-h-full max-w-full object-contain transition duration-500 hover:scale-[1.03]" loading="lazy" />`
                    : `<div class="flex h-full w-full items-center justify-center text-xs text-white/40">Sin imagen</div>`
                }
              </div>
              <div class="product-card-actions flex min-h-0 flex-1 flex-col px-3 pb-3 pt-2 sm:px-4 sm:pb-4">
                <div class="product-card-title-box mt-auto w-full rounded-lg bg-zinc-800 p-2">
                  <h3 class="product-card-title line-clamp-2 text-sm font-semibold leading-snug text-white sm:text-base">${title}</h3>
                </div>
                <div class="product-card-cta-wrap mt-2 w-full shrink-0">${ctaHtml}</div>
              </div>
            </article>
          `;
        }

        function closeProductModal() {
          modalImageWrap.querySelector('iframe')?.remove();
          modal.classList.add('hidden');
          modal.classList.remove('flex');
          modal.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('overflow-hidden');
        }

        function openProduct(productIndex) {
          const product = productsCatalog[productIndex];
          if (!product) {
            return;
          }

          modalTitle.textContent = product.title;
          renderProductRating(product.rating, product.ratingCount);

          const descriptionHtml = formatDescription(product.description);
          if (descriptionHtml) {
            modalDescription.innerHTML = descriptionHtml;
            modalDescription.classList.remove('hidden');
          } else {
            modalDescription.innerHTML = '';
            modalDescription.classList.add('hidden');
          }

          const media = product.media?.length ? product.media : product.images?.length ? product.images : product.image ? [product.image] : [];
          updateGallery(media);
          modalImage.alt = product.title;

          if (product.buyUrl) {
            modalBuy.href = product.buyUrl;
            modalBuy.classList.remove('hidden');
            modalBuyUnavailable.classList.add('hidden');
          } else {
            modalBuy.href = '#';
            modalBuy.classList.add('hidden');
            modalBuyUnavailable.classList.remove('hidden');
          }

          modal.classList.remove('hidden');
          modal.classList.add('flex');
          modal.setAttribute('aria-hidden', 'false');
          document.body.classList.add('overflow-hidden');
          modalCloseBtn.focus();
        }

        window.openProduct = openProduct;
        window.closeProductModal = closeProductModal;

        function bindCardEvents() {
          grid.querySelectorAll('.product-card').forEach((card) => {
            const index = Number(card.dataset.productIndex);

            card.addEventListener('click', (event) => {
              if (event.target.closest('[data-amazon-cta]')) {
                return;
              }
              openProduct(index);
            });
            card.addEventListener('keydown', (event) => {
              if (event.target.closest('[data-amazon-cta]')) {
                return;
              }
              if (event.key === 'Enter' || event.key === ' ') {
                event.preventDefault();
                openProduct(index);
              }
            });
          });
        }

        modalThumbnails.addEventListener('click', (event) => {
          const thumb = event.target.closest('.product-modal-thumb');
          if (!thumb) {
            return;
          }
          const index = Number(thumb.dataset.thumbIndex);
          const src = thumb.dataset.thumbSrc;
          if (!src) {
            return;
          }
          if (thumb.dataset.thumbType === 'video') {
            setMainVideo(src, index);
          } else {
            setMainImage(src, index);
          }
        });

        modalCloseBtn.addEventListener('click', closeProductModal);
        modalBackdrop.addEventListener('click', closeProductModal);
        document.addEventListener('keydown', (event) => {
          if (event.key === 'Escape' && !modal.classList.contains('hidden')) {
            closeProductModal();
          }
        });

        async function loadProducts() {
          try {
            const response = await fetch('./data/herramientas-productos.json');
            if (!response.ok) {
              throw new Error('No se pudo cargar el catálogo JSON.');
            }

            const payload = await response.json();
            productsCatalog = normalizeCatalog(payload);

            if (!productsCatalog.length) {
              throw new Error('El JSON no contiene productos válidos.');
            }

            grid.innerHTML = productsCatalog.map(renderCard).join('');
            bindCardEvents();
          } catch (error) {
            errorBox.textContent = error instanceof Error ? error.message : 'Error al cargar productos.';
            errorBox.classList.remove('hidden');
          }
        }

        loadProducts();
      })();
    </script>
